---
name: on pull_request

"on":
  pull_request:

jobs:
  test:
    permissions:
      contents: read
    runs-on: ubuntu-24.04
    timeout-minutes: 10

    steps:
      - name: checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Node.jsを使ふ
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          cache: npm
          node-version: 24

      - name: 依存するlibraryを入れる
        run: npm ci

      - name: testする
        run: npm test

  lint-gha:
    permissions:
      checks: write
      contents: read
      pull-requests: write
    runs-on: ubuntu-24.04
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - uses: ne-sachirou/lint-gha-reviewdog@ef912fb73025b91707d65f304f6942ef066940c2 # v0.0.5
        with:
          fail_on_error: true
          github_token: ${{github.token}}
